#!/usr/sbin/nft -f
# =============================================================================
# xnftables — mesh-or-nothing firewall policy
# =============================================================================
# Philosophy: if you are not inside the mesh, you see nothing.
#   - Deny-all input/forward by default
#   - Every exception is EXPLICIT, NAMED, and DOCUMENTED
#   - Logging before drop — every rejected packet leaves a trace
#   - Least privilege at the network layer: one rule per service, one comment per rule
#
# Structure:
#   nftables.conf          ← this file (entry point, includes all others)
#   rules/00-tables.nft    ← table + chain definitions, default policies
#   rules/10-loopback.nft  ← loopback always allowed
#   rules/20-mesh.nft      ← WireGuard/mesh interface trust
#   rules/30-established.nft ← stateful conntrack
#   rules/40-services.nft  ← explicit per-service allowlist (mesh-only)
#   rules/50-vpn-endpoint.nft ← public UDP port for WireGuard handshake only
#   rules/60-icmp.nft      ← controlled ICMP (mesh-only pings, essential types)
#   rules/70-logging.nft   ← catch-all log+drop rules (must be last)
#
# Target environment: vpn.yourdomain.com / mesh CIDR 10.10.0.0/24
# Edit rules/20-mesh.nft and rules/40-services.nft for your topology.
#
# SPDX-License-Identifier: MIT
# https://github.com/paulfxyz/xnftables
# =============================================================================

flush ruleset

include "/etc/nftables/rules/00-tables.nft"
include "/etc/nftables/rules/10-loopback.nft"
include "/etc/nftables/rules/20-mesh.nft"
include "/etc/nftables/rules/30-established.nft"
include "/etc/nftables/rules/40-services.nft"
include "/etc/nftables/rules/50-vpn-endpoint.nft"
include "/etc/nftables/rules/60-icmp.nft"
include "/etc/nftables/rules/70-logging.nft"

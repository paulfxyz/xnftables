name: Validate nftables syntax

on:
  push:
    paths:
      - 'rules/**'
      - 'nftables.conf'
  pull_request:
    paths:
      - 'rules/**'
      - 'nftables.conf'

jobs:
  validate:
    name: nft syntax check
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install nftables
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y nftables
          nft --version

      - name: Validate full ruleset (dry-run)
        run: |
          # Copy rules to expected system path for includes to resolve
          sudo mkdir -p /etc/nftables
          sudo cp -r rules/ /etc/nftables/
          sudo cp nftables.conf /etc/nftables/nftables.conf
          # Dry-run: validates syntax without loading into kernel
          sudo nft -c -f /etc/nftables/nftables.conf
          echo "Syntax OK"

      - name: Check for rules without comments
        run: |
          # Every accept/drop rule should have a comment= field.
          # This catches rules added without documentation.
          missing=$(grep -rn '^\s*\(accept\|drop\|log\)' rules/ \
            | grep -v 'comment' \
            | grep -v '^\s*#' || true)
          if [[ -n "$missing" ]]; then
            echo "WARNING: Rules without comment= field:"
            echo "$missing"
            # Non-fatal for now — change to 'exit 1' to enforce strictly
          fi

      - name: Check for RFC 5737 documentation IPs in ADMIN_ALLOWLIST
        run: |
          # Documentation IPs (192.0.2.x, 198.51.100.x, 203.0.113.x) are
          # unroutable and should never appear in production allowlists.
          if grep -E '(192\.0\.2\.|198\.51\.100\.|203\.0\.113\.)' rules/00-tables.nft \
             | grep -v '^\s*#'; then
            echo "ERROR: RFC 5737 documentation IP found in active rule (not commented out)"
            exit 1
          fi
          echo "IP check OK"
